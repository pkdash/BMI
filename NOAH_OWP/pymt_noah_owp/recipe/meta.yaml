{% set data = load_setup_py_data() %}

package:
  name: "pymt_noah_owp"
  version: {{ data.get('version') }}

source:
  path: ..

build:
  number: 0
  script: "{{ PYTHON }} -m pip install . --no-deps --ignore-installed --no-cache-dir -vvv"

requirements:
  build:
    - {{ compiler('c') }}
    - {{ compiler('fortran') }}
  host:
    - python
    - pip
    - cython
    - numpy 1.11.*
    - model_metadata
  run:
    - python
    - {{ pin_compatible('numpy') }}

test:
  requires:
    - bmi-tester
    - model_metadata
  imports:
    - pymt_noah_owp
  commands:
    - config_file=$(mmd-stage NOAH_OWP . > MANIFEST && mmd-query NOAH_OWP --var=run.config_file.path)
    - bmi-test pymt_noah_owp.bmi:NOAH_OWP --config-file=$config_file --manifest=MANIFEST -v

about:
  summary: Python package that wraps the pymt_noah_owp BMI.
  home: https://github.com/pkdash/pymt_noah_owp
  license: MIT License
  license_file: LICENSE
  dev_url: https://github.com/pkdash/pymt_noah_owp
